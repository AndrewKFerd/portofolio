<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Krisna Ferdinanto | Fullstack Software Engineer</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#5195E1',
                            cream: '#eecf99',
                            dark: '#0f172a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-brand-dark text-slate-200 antialiased; }
            h1, h2, h3 { @apply font-heading; }
        }
        @layer components {
            .glass {
                @apply bg-white/5 backdrop-blur-lg border border-white/10;
            }
            .btn-primary {
                @apply px-8 py-3 bg-brand-blue text-white rounded-full font-semibold hover:bg-opacity-90 transition-all duration-300 shadow-lg shadow-brand-blue/20 active:scale-95;
            }
            .section-title {
                @apply text-4xl md:text-5xl font-bold mb-12 text-center bg-gradient-to-r from-brand-blue to-brand-cream bg-clip-text text-transparent;
            }
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(81,149,225,0.15) 0%, rgba(238,207,153,0.05) 100%);
            filter: blur(80px);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass py-4' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="text-2xl font-bold bg-gradient-to-r from-brand-blue to-brand-cream bg-clip-text text-transparent">
                            AKF.
                        </div>
                        <div className="hidden md:flex space-x-8 text-sm font-medium">
                            {['About', 'Skills', 'Experience', 'Projects', 'Contact'].map(item => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="hover:text-brand-blue transition-colors">
                                    {item}
                                </a>
                            ))}
                        </div>
                        <a href="#contact" className="px-5 py-2 glass rounded-full text-sm hover:bg-white/10 transition-all">
                            Hire Me
                        </a>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="min-h-screen pt-32 pb-20 px-6 flex flex-col items-center justify-center relative overflow-hidden">
                    <div className="blob top-[-10%] left-[-10%] animate-float"></div>
                    <div className="blob bottom-[-10%] right-[-10%] animate-float" style={{ animationDelay: '2s' }}></div>
                    
                    <div className="container mx-auto text-center z-10">
                        <div className="inline-block px-4 py-1 glass rounded-full text-brand-blue text-sm font-medium mb-6">
                            Fullstack Software Engineer
                        </div>
                        <h1 className="text-6xl md:text-8xl font-bold mb-6 tracking-tight">
                            Andrew Krisna <br/>
                            <span className="text-brand-cream">Ferdinanto</span>
                        </h1>
                        <p className="text-xl md:text-2xl text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed">
                            Crafting robust, scalable solutions with high-performance architectures 
                            and elegant user experiences.
                        </p>
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button className="btn-primary">View Projects</button>
                            <button className="px-8 py-3 glass rounded-full font-semibold hover:bg-white/10 transition-all">Download CV</button>
                        </div>
                    </div>
                    
                    <div className="absolute bottom-10 animate-bounce">
                        <svg className="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                        </svg>
                    </div>
                </section>
            );
        };

        const Skills = () => {
            const categories = [
                { title: 'Frontend', skills: ['React', 'Next.js', 'Tailwind CSS', 'TypeScript'] },
                { title: 'Backend', skills: ['Java Spring Boot', 'Node.js', 'Go', 'Python'] },
                { title: 'Database', skills: ['PostgreSQL', 'MongoDB', 'Redis', 'Oracle'] },
                { title: 'DevOps', skills: ['Docker', 'Kubernetes', 'CI/CD', 'AWS'] },
            ];

            return (
                <section id="skills" className="py-24 px-6 bg-slate-900/50">
                    <div className="container mx-auto">
                        <h2 className="section-title">Technical Expertise</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {categories.map((cat, idx) => (
                                <div key={idx} className="glass p-8 rounded-3xl hover:border-brand-blue/30 transition-all duration-300 group">
                                    <h3 className="text-xl font-bold mb-6 text-brand-cream">{cat.title}</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {cat.skills.map(skill => (
                                            <span key={skill} className="px-3 py-1 bg-white/5 rounded-md text-sm group-hover:bg-brand-blue/10 transition-all">
                                                {skill}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ProjectCard = ({ title, desc, tech }) => (
            <div className="glass group rounded-3xl overflow-hidden hover:border-brand-blue/50 transition-all duration-500">
                <div className="h-48 bg-slate-800 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-br from-brand-blue/20 to-brand-cream/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="flex items-center justify-center h-full text-slate-600 font-bold uppercase tracking-widest">
                        Preview Coming Soon
                    </div>
                </div>
                <div className="p-8">
                    <h3 className="text-2xl font-bold mb-3 group-hover:text-brand-blue transition-colors">{title}</h3>
                    <p className="text-slate-400 mb-6 line-clamp-2">{desc}</p>
                    <div className="flex flex-wrap gap-2 mb-6">
                        {tech.map(t => <span key={t} className="text-xs text-brand-cream px-2 py-1 border border-brand-cream/20 rounded">{t}</span>)}
                    </div>
                    <a href="#" className="flex items-center text-sm font-bold text-brand-blue group-hover:translate-x-2 transition-transform">
                        Explore Project <span className="ml-2">→</span>
                    </a>
                </div>
            </div>
        );

        const Projects = () => {
            const projects = [
                { title: 'Enterprise Dashboard', desc: 'Real-time monitoring system for large-scale infrastructure migration.', tech: ['React', 'D3.js', 'Spring Boot'] },
                { title: 'Secure Gateway', desc: 'Financial transaction gateway focusing on high security and low latency.', tech: ['Go', 'gRPC', 'PostgreSQL'] },
                { title: 'AI Asset Manager', desc: 'Automated document processing and indexing using LLMs.', tech: ['Python', 'FastAPI', 'Redis'] },
            ];

            return (
                <section id="projects" className="py-24 px-6">
                    <div className="container mx-auto">
                        <h2 className="section-title">Featured Works</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {projects.map((p, idx) => <ProjectCard key={idx} {...p} />)}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => {
            return (
                <section id="contact" className="py-24 px-6 relative">
                    <div className="container mx-auto max-w-4xl glass p-12 md:p-20 rounded-[3rem] text-center border-brand-blue/20">
                        <h2 className="text-4xl md:text-6xl font-bold mb-6">Let's build something <br/> <span className="text-brand-blue">incredible together.</span></h2>
                        <p className="text-slate-400 text-xl mb-12">Currently open for new opportunities and collaborations.</p>
                        <div className="flex flex-wrap justify-center gap-6">
                            <a href="mailto:andrew@example.com" className="btn-primary">Send Email</a>
                            <a href="#" className="px-8 py-3 glass rounded-full font-semibold hover:bg-white/10 transition-all">LinkedIn</a>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-12 px-6 border-t border-white/5 text-center text-slate-500 text-sm">
                <p>&copy; 2026 Andrew Krisna Ferdinanto. Built with React & Tailwind CSS.</p>
            </footer>
        );

        const App = () => {
            return (
                <div className="scroll-smooth">
                    <Navbar />
                    <Hero />
                    <Skills />
                    <Projects />
                    <Contact />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide Icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
